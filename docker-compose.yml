services:
  db:
    build: ./db
    container_name: postgres_db
    restart: always
    # Postgres only applies POSTGRES_USER/PASSWORD on first init of postgres_data.
    # If you change database.username/password in configuration.json, reset the volume
    # (docker compose down -v) or ALTER USER ... PASSWORD in psql, or auth will fail.
    environment:
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configuration.json:/configuration.json:ro
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: flask_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./configuration.json:/app/configuration.json:ro

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: